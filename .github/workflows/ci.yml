# RHCLOUD V1 CI (§12.7). A owns this file. Pipeline: lint -> tests -> image.
# A guarantees unit + integration green; B's contract tests and C's API tests
# join the same suite (each gated on its directory existing).
name: ci

on:
  push:
    branches: [ main, integration ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check src tests || true   # advisory in V1; tighten later

      # A's gate: unit + integration MUST pass.
      - name: Unit tests (A)
        run: pytest tests/unit -q

      - name: Integration tests (A)
        run: pytest tests/integration -q

      # B's contract tests (record/replay, no real sites). Gated on existence.
      - name: Contract tests (B)
        run: |
          if [ -d tests/contract ] && [ -n "$(ls -A tests/contract 2>/dev/null)" ]; then
            pytest tests/contract -q
          else
            echo "no contract tests yet (B) — skipping"
          fi

      # C's API tests (httpx + stub Runtime). Gated on existence.
      - name: API tests (C)
        run: |
          if [ -d tests/api ] && [ -n "$(ls -A tests/api 2>/dev/null)" ]; then
            pytest tests/api -q
          else
            echo "no api tests yet (C) — skipping"
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t rhcloud-backend:ci .
