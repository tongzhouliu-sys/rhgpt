# Railway config-as-code for the RHCLOUD V1 backend.
# Build from the Dockerfile (headed Chromium under Xvfb); health-check on /health
# (open, no auth). IMPORTANT: run a SINGLE instance — the Job registry and SSE
# event buffer are in-memory; do not raise replicas.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
